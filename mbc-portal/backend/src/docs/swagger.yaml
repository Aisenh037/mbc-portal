openapi: 3.0.0
info:
  title: MBC Department API
  version: 1.0.0
servers:
  - url: /api
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Logged in
  /auth/register:
    post:
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                role: { type: string }
      responses:
        '201':
          description: Registered
  /auth/me:
    get:
      summary: Current user
      responses:
        '200':
          description: OK
  /analytics/overview:
    get:
      summary: Department overview metrics
      responses:
        '200':
          description: Overview payload
  /users:
    get:
      summary: List users (admin/developer)
      responses:
        '200':
          description: OK