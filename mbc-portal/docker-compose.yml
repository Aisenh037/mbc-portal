services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
  analytics:
    build: ./services/analytics
    restart: unless-stopped
    ports:
      - "8000:8000"
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
      - analytics
      - mailhog
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/mbc_portal
      - CLIENT_URL=http://localhost:5173
      - CORS_ORIGIN=http://localhost:5173
      - JWT_SECRET=0123456789abcdef0123456789abcdef
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_SECRET=fedcba9876543210fedcba9876543210
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - EMAIL_FROM=MBC Dept <no-reply@mbc.local>
      - UPLOAD_DIR=uploads
      - S3_ENABLE=false
      - PY_SERVICE_URL=http://analytics:8000
      - DEFAULT_ADMIN_USERID=admin
      - DEFAULT_ADMIN_EMAIL=admin@mbc.local
      - DEFAULT_ADMIN_PASSWORD=admin123
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
volumes:
  mongo_data:
